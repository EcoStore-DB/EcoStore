<div class="container mt-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-4 mb-4">
            <div class="list-group shadow-sm rounded">
                <button class="list-group-item list-group-item-action d-flex align-items-center justify-content-between"
                    [class.active]="activeTab === 'config'" (click)="activeTab = 'config'">
                    Configuraciones
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button class="list-group-item list-group-item-action d-flex align-items-center justify-content-between"
                    [class.active]="activeTab === 'seguimiento'" (click)="activeTab = 'seguimiento'">
                    Seguimiento de Pedido
                    <i class="fa-solid fa-truck"></i>
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="col-md-8">
            <div [ngSwitch]="activeTab">
                <!-- Configuraciones -->
                <div *ngSwitchCase="'config'">
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <h4 class="card-title mb-4 text-success">Configuraciones</h4>
                            <form>
                                <div class="mb-4">
                                    <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                    <input type="text" class="form-control form-control-lg" id="nombre"
                                        placeholder="Tu nombre">
                                </div>
                                <div class="mb-4">
                                    <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                                    <input type="email" class="form-control form-control-lg" id="email"
                                        placeholder="correo@ejemplo.com">
                                </div>

                                <div class="mt-4 my-5 py-5">
                                    <button type="submit" class="btn btn-success btn-lg px-3 me-3">Guardar
                                        Cambios</button>
                                    <button type="submit" class="btn btn-danger btn-lg px-3">Cerrar Sesión</button>
                                </div>


                            </form>
                        </div>
                    </div>
                </div>

                <!-- Seguimiento de Pedido -->
                <div *ngSwitchCase="'seguimiento'">
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <h4 class="card-title mb-4 text-success">Seguimiento de Pedido</h4>
                            <p class="mb-4">Introduce tu número de pedido para consultar el estado.</p>
                            <form class="mb-4">
                                <div class="mb-3">
                                    <label for="pedido" class="form-label fw-semibold">Número de pedido</label>
                                    <input type="text" class="form-control form-control-lg" id="pedido"
                                        placeholder="#123456">
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg px-4">Buscar</button>
                            </form>

                            <!-- Resultados (ejemplo) -->
                            <div class="alert alert-info rounded-3 shadow-sm">
                                <p><strong>Estado:</strong> En tránsito</p>
                                <p><strong>Fecha estimada de entrega:</strong> 15 de junio de 2025</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Default -->
                <div *ngSwitchDefault>
                    <p class="text-muted fst-italic">Selecciona una opción del menú.</p>
                </div>
            </div>
        </div>
    </div>
</div>
