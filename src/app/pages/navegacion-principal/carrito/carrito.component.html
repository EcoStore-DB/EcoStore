<div class="container mt-5">
  <h3>Mi Carrito</h3>

  <div *ngIf="carrito.length > 0; else vacio">
    <table class="table table-bordered mt-3">
      <thead class="table-light">
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of carrito; let i = index">
          <td>{{ item.nombre }}</td>
          <td>{{ item.cantidad }}</td>
          <td>${{ item.precio.toFixed(2) }}</td>
          <td>${{ (item.precio * item.cantidad).toFixed(2) }}</td>
          <td>
            <button class="btn btn-danger btn-sm" (click)="eliminarItem(i)">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="text-end">
      <h5>Total: ${{ total.toFixed(2) }}</h5>
      <button class="btn btn-success mt-2">Proceder al Pago</button>
    </div>
  </div>

  <ng-template #vacio>
    <div class="alert alert-info mt-3">Tu carrito está vacío.</div>
  </ng-template>
</div>
